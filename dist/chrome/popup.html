<!DOCTYPE html>
<html>
<head><meta charset="utf-8"/><title>OpenCode DOM Editor</title></head>
<body style="width:360px;padding:20px;font-family:system-ui,sans-serif;background:#0f0f1a;color:#fff;box-sizing:border-box">
  <header style="margin-bottom:24px">
    <h1 style="margin:0;font-size:20px;font-weight:600;color:#fff">OpenCode DOM Editor</h1>
    <p style="margin:4px 0 0;font-size:13px;color:rgba(255,255,255,0.5)">Select a project to edit</p>
  </header>
  <section style="margin-bottom:24px">
    <label style="display:block;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;color:rgba(255,255,255,0.4);margin-bottom:8px">Select Project</label>
    <select id="project-select" style="width:100%;padding:10px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);color:#fff;font-size:14px;outline:none;cursor:pointer">
      <option value="">Loading projects...</option>
    </select>
    <div id="status" style="margin-top:8px;font-size:13px;color:rgba(255,255,255,0.5);text-align:center"></div>
  </section>
  <section style="margin-bottom:24px">
    <button id="save-btn" disabled style="width:100%;padding:12px;border-radius:6px;border:none;background:#0066ff;color:#fff;font-size:14px;cursor:pointer;opacity:0.5">Save Selection</button>
  </section>
  <section style="margin-bottom:24px">
    <button id="refresh-btn" style="width:100%;padding:10px;border-radius:6px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:#fff;font-size:14px;cursor:pointer">Refresh Projects</button>
  </section>
  <footer style="display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px solid rgba(255,255,255,0.1)">
    <p style="font-size:12px;color:rgba(255,255,255,0.5);margin:0">Shortcut: <kbd style="background:rgba(255,255,255,0.1);padding:2px 6px;border-radius:4px;font-size:11px">Ctrl+Shift+E</kbd></p>
    <span id="saved" style="color:#00ff88;font-size:13px;display:none">Saved!</span>
  </footer>
  <script src="popup.js"></script>
</body>
</html>
